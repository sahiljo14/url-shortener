<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>URL Shortener</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<h1>URL Shortener</h1>

<div class="card">

<input id="urlInput" placeholder="Enter a long URL">

<button onclick="shortenUrl()">Shorten</button>

<div id="result"></div>

</div>


<div class="card">

<h2>Your Links</h2>

<table>

<thead>
<tr>
<th>Short Link</th>
<th>Clicks</th>
<th>Action</th>
</tr>
</thead>

<tbody id="linksTable"></tbody>

</table>

</div>

</div>


<!-- Toast notification -->
<div id="toast" class="toast"></div>


<script src="script.js"></script>

</body>
</html>
